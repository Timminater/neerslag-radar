name: Release

on:
  push:
    branches:
      - main
    paths:
      - brand/**
      - custom_components/**
      - hacs.json
  workflow_dispatch:
    inputs:
      version:
        description: Version to release; must match manifest.json
        required: false
        type: string
      target:
        description: Commit or tag to release; defaults to the current commit
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.target || github.sha }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14.2"
          cache: pip
      - name: Install test dependencies
        run: >-
          python -m pip install
          homeassistant==2026.7.2
          netCDF4==1.7.4
          pyproj==3.7.2
          pytest
          pytest-asyncio
          pytest-homeassistant-custom-component
          ruff
      - name: Lint
        run: ruff check .
      - name: Test
        run: python -m pytest

  hacs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.target || github.sha }}
      - uses: hacs/action@main
        with:
          category: integration

  hassfest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.target || github.sha }}
      - uses: home-assistant/actions/hassfest@master

  release:
    needs:
      - tests
      - hacs
      - hassfest
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.target || github.sha }}

      - name: Read and validate version
        id: manifest
        env:
          REQUESTED_VERSION: ${{ inputs.version }}
        shell: bash
        run: |
          manifest_version="$(python -c 'import json; print(json.load(open("custom_components/neerslag_radar/manifest.json"))["version"])')"
          version="${REQUESTED_VERSION:-$manifest_version}"
          if [[ "$version" != "$manifest_version" ]]; then
            echo "Requested version $version does not match manifest.json version $manifest_version." >&2
            exit 1
          fi
          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+([+-][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid semantic version in manifest.json: $version" >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "target=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub release
        env:
          EVENT_NAME: ${{ github.event_name }}
          GH_TOKEN: ${{ github.token }}
          TARGET: ${{ steps.manifest.outputs.target }}
          VERSION: ${{ steps.manifest.outputs.version }}
        shell: bash
        run: |
          if gh release view "$VERSION" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            if [[ "$EVENT_NAME" != "push" ]]; then
              echo "Release $VERSION already exists; nothing to publish."
              exit 0
            fi

            if [[ "$VERSION" == *-* || "$VERSION" == *+* ]]; then
              echo "Automatic patch bumps require a stable semantic version, got $VERSION." >&2
              exit 1
            fi

            next_version="$(python -c 'import os; major, minor, patch = map(int, os.environ["VERSION"].split(".")); print(f"{major}.{minor}.{patch + 1}")')"
            if gh release view "$next_version" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
              echo "Release $next_version already exists; nothing to publish."
              exit 0
            fi

            VERSION="$next_version"
            export VERSION
            python - <<'PY'
          import os
          import re
          from pathlib import Path

          path = Path("custom_components/neerslag_radar/manifest.json")
          text = path.read_text(encoding="utf-8")
          updated, count = re.subn(
              r'("version"\s*:\s*")[^"]+(")',
              rf'\g<1>{os.environ["VERSION"]}\2',
              text,
              count=1,
          )
          if count != 1:
              raise SystemExit("Could not update exactly one manifest version")
          path.write_text(updated, encoding="utf-8")
          PY
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add custom_components/neerslag_radar/manifest.json
            git commit -m "Bump version to $VERSION [skip ci]"
            git push origin HEAD:main
            TARGET="$(git rev-parse HEAD)"
          fi

          git fetch --tags --force
          tag_exists=false
          if git rev-parse --verify --quiet "refs/tags/$VERSION" >/dev/null; then
            tag_exists=true
            tag_commit="$(git rev-list -n 1 "$VERSION")"
            if [[ "$tag_commit" != "$TARGET" ]]; then
              echo "Tag $VERSION points to $tag_commit instead of $TARGET." >&2
              exit 1
            fi
          fi

          if [[ "$tag_exists" == false ]]; then
            git tag "$VERSION" "$TARGET"
            git push origin "refs/tags/$VERSION"
          fi

          release_args=(
            "$VERSION"
            --repo "$GITHUB_REPOSITORY"
            --title "$VERSION"
            --generate-notes
          )
          if [[ "$VERSION" == *-* ]]; then
            release_args+=(--prerelease)
          fi
          gh release create "${release_args[@]}"
